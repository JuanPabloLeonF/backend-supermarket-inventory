# API
spring:

  # DATABASE
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver

  # JPA
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

# APPLICATION
app:
  path-upload-images-products: ${UPLOAD_PATH_PRODUCTS_DEV:uploads/dev/products}