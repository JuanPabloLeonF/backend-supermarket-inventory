spring:
    # DATABASE
    datasource:
        url: ${DB_URL}
        driverClassName: org.postgresql.Driver
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}

    # JPA
    jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        show-sql: false
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

# APPLICATION
app:
    path-upload-images-products: ${UPLOAD_PATH_EMPLOYEE}